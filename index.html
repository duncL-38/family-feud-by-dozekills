<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Feud</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --blue: #1a3a6e;
    --gold: #f5c518;
    --gold-dark: #c9a010;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --white: #ffffff;
    --grey: #8a9bb0;
    --grey-light: #d4dde9;
    --board-bg: #0d2145;
    --correct: #27ae60;
    --wrong: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARS BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,.3)  0%, transparent 100%),
      radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,.2)  0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  #app { position: relative; z-index: 1; }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; padding: 24px 16px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── HEADER ── */
  .logo {
    font-family: 'Anton', sans-serif;
    font-size: clamp(2.4rem, 8vw, 5rem);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    margin-bottom: 4px;
  }
  .logo span { color: var(--gold); }
  .logo-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 600; letter-spacing: 6px;
    color: var(--grey); text-transform: uppercase; text-align: center;
    margin-bottom: 32px;
  }

  /* ── CARD ── */
  .card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%; max-width: 720px;
    backdrop-filter: blur(4px);
  }
  .card + .card { margin-top: 20px; }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold); margin-bottom: 18px;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; border: none;
    border-radius: 8px; padding: 13px 28px; transition: all .15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-gold {
    background: var(--gold); color: var(--navy);
  }
  .btn-gold:hover { background: var(--gold-dark); transform: translateY(-1px); }
  .btn-red {
    background: var(--red); color: var(--white);
  }
  .btn-red:hover { background: var(--red-bright); transform: translateY(-1px); }
  .btn-outline {
    background: transparent; color: var(--white);
    border: 2px solid rgba(255,255,255,.25);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-sm { font-size: .85rem; padding: 7px 16px; }
  .btn:disabled { opacity: .4; cursor: default; transform: none !important; }

  /* ── INPUTS ── */
  input[type="text"], input[type="number"], textarea {
    background: rgba(255,255,255,.07);
    border: 1.5px solid rgba(255,255,255,.15);
    border-radius: 8px; color: var(--white);
    font-family: 'Barlow', sans-serif; font-size: 1rem;
    padding: 10px 14px; width: 100%;
    transition: border-color .2s;
  }
  input::placeholder, textarea::placeholder { color: var(--grey); }
  input:focus, textarea:focus {
    outline: none; border-color: var(--gold);
  }

  /* ── Q&A EDITOR ── */
  .qa-list { display: flex; flex-direction: column; gap: 16px; }
  .qa-item {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px; padding: 18px;
  }
  .qa-item-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .qa-num {
    font-family: 'Anton', sans-serif; font-size: 1.4rem;
    color: var(--gold); min-width: 32px;
  }
  .qa-question-input { flex: 1; }
  .answers-grid {
    display: flex; flex-direction: column;
    gap: 8px; margin-top: 12px;
  }
  .answer-row {
    display: flex; align-items: center; gap: 8px;
  }
  .answer-points {
    flex: 1; min-width: 0;
  }
  .answer-text { flex: 1; min-width: 0; }
  .answer-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .75rem; font-weight: 600; letter-spacing: 2px;
    color: var(--grey); text-transform: uppercase; margin-bottom: 4px;
  }
  .remove-btn {
    background: none; border: none; color: var(--grey);
    cursor: pointer; font-size: 1.2rem; padding: 4px;
    border-radius: 4px; transition: color .15s;
    line-height: 1;
  }
  .remove-btn:hover { color: var(--red-bright); }

  /* ── TEAM SETUP ── */
  .teams-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .team-card {
    flex: 1; min-width: 180px; background: rgba(255,255,255,.05);
    border: 2px solid; border-radius: 12px; padding: 14px;
  }
  .team-card:nth-child(1) { border-color: #e74c3c; }
  .team-card:nth-child(2) { border-color: #3498db; }
  .team-card:nth-child(3) { border-color: #2ecc71; }
  .team-card:nth-child(4) { border-color: #f39c12; }
  .team-name-input { font-size: .95rem; margin-bottom: 8px; }

  /* ── GAME BOARD ── */
  #gameScreen { background: var(--board-bg); }
  .game-header {
    width: 100%; max-width: 900px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
  }
  .scores-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .score-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 1px;
    padding: 6px 16px; border-radius: 100px;
    border: 2px solid; background: rgba(0,0,0,.3);
    transition: all .3s;
  }
  .score-chip.active-team {
    transform: scale(1.08);
    box-shadow: 0 0 16px currentColor;
  }
  .score-chip:nth-child(1) { border-color: #e74c3c; color: #e74c3c; }
  .score-chip:nth-child(2) { border-color: #3498db; color: #3498db; }
  .score-chip:nth-child(3) { border-color: #2ecc71; color: #2ecc71; }
  .score-chip:nth-child(4) { border-color: #f39c12; color: #f39c12; }

  .round-info {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .9rem; font-weight: 600; letter-spacing: 3px;
    color: var(--grey); text-transform: uppercase;
  }

  /* ── QUESTION BOARD ── */
  .board-container { width: 100%; max-width: 900px; }
  .board-question {
    font-family: 'Anton', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    text-align: center; color: var(--gold);
    background: var(--blue); border-radius: 12px;
    padding: 18px 24px; margin-bottom: 16px;
    border: 2px solid rgba(245,197,24,.3);
    letter-spacing: 1px;
  }

  .answers-board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .answer-tile {
    background: var(--blue);
    border: 2px solid rgba(255,255,255,.1);
    border-radius: 10px; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all .2s;
    min-height: 64px;
    position: relative; overflow: hidden;
  }
  .answer-tile:hover:not(.revealed):not(.wrong-tile) {
    border-color: var(--gold); background: #1f4585;
  }
  .answer-tile.revealed {
    background: #155a2e; border-color: var(--correct);
    cursor: default; animation: flipIn .4s ease;
  }
  .answer-tile.wrong-tile {
    background: #5a1515; border-color: var(--wrong);
    cursor: default; animation: shake .4s ease;
  }
  @keyframes flipIn {
    0%   { transform: scaleY(0); opacity: 0; }
    60%  { transform: scaleY(1.08); }
    100% { transform: scaleY(1); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%  { transform: translateX(-8px); }
    75%  { transform: translateX(8px); }
  }
  .tile-num {
    font-family: 'Anton', sans-serif; font-size: 1.6rem;
    color: rgba(255,255,255,.2); min-width: 32px; text-align: center;
  }
  .tile-num.shown { color: var(--gold); }
  .tile-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; flex: 1;
  }
  .tile-hidden { color: rgba(255,255,255,.15); }
  .tile-pts {
    font-family: 'Anton', sans-serif; font-size: 1.3rem;
    color: var(--gold);
  }

  /* ── X STRIKES ── */
  .strikes-row {
    display: flex; justify-content: center; gap: 16px; margin-bottom: 20px;
  }
  .strike-x {
    font-family: 'Anton', sans-serif; font-size: 2.5rem;
    color: rgba(255,255,255,.1);
    transition: all .3s;
  }
  .strike-x.active {
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-bright);
    animation: pop .3s ease;
  }
  @keyframes pop {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ── GUESS INPUT ── */
  .guess-row {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .guess-row input { flex: 1; font-size: 1.05rem; }

  /* ── TURN INFO ── */
  .turn-banner {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; text-align: center;
    color: var(--gold); margin-bottom: 14px;
  }

  /* ── ROUND POT ── */
  .pot-display {
    font-family: 'Anton', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold); text-align: center; margin-bottom: 8px;
    text-shadow: 0 0 24px rgba(245,197,24,.5);
  }
  .pot-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .85rem; font-weight: 600; letter-spacing: 4px;
    color: var(--grey); text-transform: uppercase; text-align: center;
    margin-bottom: 20px;
  }

  /* ── CONTROLS ROW ── */
  .controls-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 16px;
  }

  /* ── REVEAL ALL ── */
  .reveal-all-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .9rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; background: none;
    border: 1.5px solid rgba(255,255,255,.2); border-radius: 6px;
    color: var(--grey); cursor: pointer; padding: 6px 14px;
    transition: all .15s;
  }
  .reveal-all-btn:hover { color: var(--white); border-color: var(--white); }

  /* ── WINNER SCREEN ── */
  .winner-card {
    text-align: center; padding: 48px 32px;
  }
  .winner-trophy { font-size: 5rem; margin-bottom: 16px; animation: bounce 1s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  .winner-title {
    font-family: 'Anton', sans-serif;
    font-size: clamp(2rem, 8vw, 4rem);
    color: var(--gold); letter-spacing: 2px; margin-bottom: 8px;
  }
  .winner-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 700;
    color: var(--white); letter-spacing: 2px; margin-bottom: 28px;
  }
  .final-scores { display: flex; flex-direction: column; gap: 10px; max-width: 360px; margin: 0 auto 32px; }
  .final-score-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem;
    font-weight: 700; letter-spacing: 1px; padding: 10px 20px;
    background: rgba(255,255,255,.05); border-radius: 8px;
  }

  /* ── FLASH OVERLAY ── */
  .flash-overlay {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
  }
  .flash-overlay.show { animation: flashAnim 1.2s ease forwards; }
  @keyframes flashAnim {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .flash-content {
    font-family: 'Anton', sans-serif;
    font-size: clamp(3rem, 12vw, 7rem);
    letter-spacing: 4px; text-align: center;
    text-shadow: 0 4px 24px rgba(0,0,0,.8);
    filter: drop-shadow(0 0 32px currentColor);
  }
  .flash-correct { color: var(--correct); background: rgba(39,174,96,.15); }
  .flash-wrong   { color: var(--red-bright); background: rgba(231,76,60,.15); }

  /* ── MODE PILLS ── */
  .mode-toggle {
    display: flex; gap: 0; background: rgba(255,255,255,.06);
    border-radius: 8px; padding: 4px; margin-bottom: 20px;
  }
  .mode-pill {
    flex: 1; font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; padding: 9px 20px;
    border-radius: 6px; cursor: pointer; border: none;
    background: transparent; color: var(--grey);
    transition: all .2s;
  }
  .mode-pill.active { background: var(--gold); color: var(--navy); }

  /* ── DIVIDER ── */
  .divider { width: 100%; height: 1px; background: rgba(255,255,255,.08); margin: 20px 0; }

  /* ── UTIL ── */
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .mt8 { margin-top: 8px; }
  .mt16 { margin-top: 16px; }
  .text-grey { color: var(--grey); font-size: .9rem; }
  .w100 { width: 100%; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--gold); color: var(--navy);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 12px 28px; border-radius: 100px; z-index: 999;
    transition: transform .3s ease;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .answers-board { grid-template-columns: 1fr; }
    .guess-row { flex-direction: column; }
    .controls-row .btn { flex: 1; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP SCREEN -->
  <div id="setupScreen" class="screen active">
    <div class="logo">FAMILY <span>FEUD</span></div>
    <div class="logo-sub">by dozekills</div>

    <!-- Q&A Editor -->
    <div class="card" style="max-width:760px">
      <div class="section-title">📋 Questions &amp; Answers</div>
      <div id="qaList" class="qa-list"></div>
      <div class="mt16 row">
        <button class="btn btn-outline btn-sm" onclick="addQuestion()">+ Add Question</button>
        <button class="btn btn-gold btn-sm" id="generateBtn" onclick="generateRandom()">✦ Generate Random</button>
        <span class="text-grey" id="qaCount">0 questions</span>
      </div>
    </div>

    <!-- Teams -->
    <div class="card" style="max-width:760px; margin-top:16px">
      <div class="section-title">👥 Teams / Players</div>
      <div class="mode-toggle">
        <button class="mode-pill active" id="teamsMode" onclick="setMode('teams')">Teams</button>
        <button class="mode-pill" id="indivMode" onclick="setMode('individual')">Individual</button>
      </div>
      <div id="teamSetup"></div>
      <div class="mt16 row">
        <button class="btn btn-outline btn-sm" id="addTeamBtn" onclick="addTeam()">+ Add Team</button>
        <button class="btn btn-outline btn-sm" id="removeTeamBtn" onclick="removeTeam()">− Remove</button>
      </div>
    </div>

    <div style="margin-top:24px">
      <button class="btn btn-gold" onclick="startGame()" style="font-size:1.3rem;padding:16px 48px">
        ▶ Start Game
      </button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <div class="scores-bar" id="scoresBar"></div>
      <div class="round-info" id="roundInfo"></div>
      <button class="btn btn-outline btn-sm" onclick="endGame()">✕ End Game</button>
    </div>

    <div class="board-container">
      <div class="pot-display" id="potDisplay">0</div>
      <div class="pot-label">Points This Round</div>

      <div class="board-question" id="boardQuestion"></div>

      <div class="turn-banner" id="turnBanner"></div>

      <div class="strikes-row" id="strikesRow">
        <div class="strike-x" id="s1">✗</div>
        <div class="strike-x" id="s2">✗</div>
        <div class="strike-x" id="s3">✗</div>
      </div>

      <div class="answers-board" id="answersBoard"></div>

      <div class="guess-row">
        <input type="text" id="guessInput" placeholder="Type an answer and press Enter…" onkeydown="if(event.key==='Enter')submitGuess()">
        <button class="btn btn-gold" onclick="submitGuess()">Guess</button>
      </div>

      <div class="controls-row">
        <button class="btn btn-red btn-sm" onclick="addStrike()">✗ Wrong Answer</button>
        <button class="btn btn-outline btn-sm" onclick="nextTeamTurn()">⇒ Pass Turn</button>
        <button class="reveal-all-btn" onclick="revealAll()">Reveal All</button>
        <button class="btn btn-outline btn-sm" onclick="nextQuestion()">Next Q »</button>
      </div>
    </div>
  </div>

  <!-- WINNER SCREEN -->
  <div id="winnerScreen" class="screen">
    <div class="card winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-title">WINNER!</div>
      <div class="winner-name" id="winnerName"></div>
      <div class="final-scores" id="finalScores"></div>
      <div class="row" style="justify-content:center;gap:12px">
        <button class="btn btn-gold" onclick="playAgain()">▶ Play Again</button>
        <button class="btn btn-outline" onclick="backToSetup()">Edit Questions</button>
      </div>
    </div>
  </div>
</div>

<!-- FLASH OVERLAY -->
<div class="flash-overlay" id="flashOverlay">
  <div class="flash-content" id="flashContent"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let questions = [];       // [{q, answers:[{text,pts}]}]
let teams = [];           // [{name, score, color}]
let mode = 'teams';       // 'teams' | 'individual'

let currentQ = 0;
let currentTeam = 0;
let strikes = 0;
let roundPot = 0;
let revealedAnswers = new Set();

const TEAM_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12'];

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
//  AI QUESTION GENERATOR
// ═══════════════════════════════════════════════
async function generateRandom() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating…';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Generate 5 fun Family Feud style survey questions with answers. Return ONLY a JSON array, no markdown, no explanation. Format:
[
  {
    "q": "Name something people do on a Sunday morning.",
    "answers": [
      {"text": "Sleep in", "pts": 42},
      {"text": "Go to church", "pts": 28},
      {"text": "Make breakfast", "pts": 15},
      {"text": "Watch TV", "pts": 8},
      {"text": "Exercise", "pts": 5},
      {"text": "Read the paper", "pts": 2}
    ]
  }
]
Rules: 5 questions, each with 5-7 answers, points must add up to 100 per question, points descending, answers are realistic survey-style responses, questions are fun and family-friendly.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const generated = JSON.parse(clean);

    // Merge: append generated questions (don't wipe existing ones if they have content)
    captureInputValues();
    const hasContent = questions.some(q => q.q.trim() && q.answers.some(a => a.text.trim()));
    if (hasContent) {
      if (confirm('Replace existing questions with generated ones?\n\nClick Cancel to append instead.')) {
        questions = generated;
      } else {
        questions = [...questions, ...generated];
      }
    } else {
      questions = generated;
    }

    renderQAList();
    showToast('✦ 5 questions generated!');
  } catch (err) {
    console.error(err);
    showToast('Generation failed — try again');
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ Generate Random';
  }
}

window.onload = () => {
  addQuestion();
  addQuestion();
  // default 2 teams
  teams = [
    {name:'Team Red',   score:0, color:TEAM_COLORS[0]},
    {name:'Team Blue',  score:0, color:TEAM_COLORS[1]},
  ];
  renderTeams();
};

// ═══════════════════════════════════════════════
//  MODE
// ═══════════════════════════════════════════════
function setMode(m) {
  mode = m;
  document.getElementById('teamsMode').classList.toggle('active', m==='teams');
  document.getElementById('indivMode').classList.toggle('active', m==='individual');
  document.getElementById('addTeamBtn').textContent = m==='teams' ? '+ Add Team' : '+ Add Player';
  document.getElementById('removeTeamBtn').textContent = m==='teams' ? '− Remove Team' : '− Remove Player';

  if (m==='individual' && teams.length < 2) {
    teams = [
      {name:'Player 1', score:0, color:TEAM_COLORS[0]},
      {name:'Player 2', score:0, color:TEAM_COLORS[1]},
      {name:'Player 3', score:0, color:TEAM_COLORS[2]},
      {name:'Player 4', score:0, color:TEAM_COLORS[3]},
    ];
  } else if (m==='teams' && teams.length > 2) {
    teams = teams.slice(0,2);
  }
  renderTeams();
}

// ═══════════════════════════════════════════════
//  TEAM SETUP
// ═══════════════════════════════════════════════
function renderTeams() {
  const el = document.getElementById('teamSetup');
  el.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'teams-row';
  teams.forEach((t,i) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.style.borderColor = TEAM_COLORS[i % TEAM_COLORS.length];
    card.innerHTML = `
      <div class="answer-label">${mode==='teams'?'Team':'Player'} ${i+1}</div>
      <input class="team-name-input" type="text" value="${t.name}" oninput="teams[${i}].name=this.value" placeholder="Enter name…">
    `;
    row.appendChild(card);
  });
  el.appendChild(row);
}

function addTeam() {
  if (teams.length >= 8) { showToast('Maximum 8 '+(mode==='teams'?'teams':'players')); return; }
  const i = teams.length;
  teams.push({name: mode==='teams'?`Team ${i+1}`:`Player ${i+1}`, score:0, color:TEAM_COLORS[i%TEAM_COLORS.length]});
  renderTeams();
}

function removeTeam() {
  if (teams.length <= 2) { showToast('Need at least 2'); return; }
  teams.pop(); renderTeams();
}

// ═══════════════════════════════════════════════
//  QUESTION EDITOR
// ═══════════════════════════════════════════════
function addQuestion() {
  captureInputValues();
  questions.push({q:'', answers: Array.from({length:6},()=>({text:'',pts:0}))});
  renderQAList();
  setTimeout(() => {
    const items = document.querySelectorAll('.qa-item');
    const last = items[items.length - 1];
    if (last) last.querySelector('.qa-question-input').focus();
  }, 50);
}

function removeQuestion(i) {
  if (questions.length === 1) { showToast('Need at least 1 question'); return; }
  captureInputValues();
  questions.splice(i,1);
  renderQAList();
}

function renderQAList() {
  const list = document.getElementById('qaList');
  const existingItems = list.querySelectorAll('.qa-item');

  // Sync state from any live inputs before rebuilding
  existingItems.forEach((item, qi) => {
    const qInput = item.querySelector('.qa-question-input');
    if (qInput && questions[qi]) questions[qi].q = qInput.value;
    item.querySelectorAll('.answer-row').forEach((row, ai) => {
      const txt = row.querySelector('.answer-text');
      const pts = row.querySelector('.answer-points');
      if (txt && questions[qi] && questions[qi].answers[ai]) {
        questions[qi].answers[ai].text = txt.value;
        questions[qi].answers[ai].pts  = parseInt(pts.value) || 0;
      }
    });
  });

  // Rebuild DOM
  list.innerHTML = '';
  questions.forEach((q, qi) => {
    const item = document.createElement('div');
    item.className = 'qa-item';

    // Header
    const header = document.createElement('div');
    header.className = 'qa-item-header';
    header.innerHTML = `<div class="qa-num">Q${qi+1}</div>`;

    const qInput = document.createElement('input');
    qInput.className = 'qa-question-input';
    qInput.type = 'text';
    qInput.placeholder = 'Enter survey question…';
    qInput.value = q.q;
    qInput.addEventListener('input', () => { questions[qi].q = qInput.value; });
    header.appendChild(qInput);

    const removeQ = document.createElement('button');
    removeQ.className = 'remove-btn';
    removeQ.title = 'Remove question';
    removeQ.textContent = '✕';
    removeQ.addEventListener('click', () => removeQuestion(qi));
    header.appendChild(removeQ);
    item.appendChild(header);

    const label = document.createElement('div');
    label.className = 'answer-label';
    label.textContent = 'Answers (up to 8 — highest points first)';
    item.appendChild(label);

    const colHeaders = document.createElement('div');
    colHeaders.style.cssText = 'display:flex;gap:8px;padding:0 0 2px 30px;';
    colHeaders.innerHTML = '<span style="flex:1;font-family:\'Barlow Condensed\',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:2px;color:var(--grey);text-transform:uppercase;">Answer Text</span><span style="flex:1;font-family:\'Barlow Condensed\',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:2px;color:var(--grey);text-transform:uppercase;">Points</span>';
    item.appendChild(colHeaders);

    // Answers grid
    const grid = document.createElement('div');
    grid.className = 'answers-grid';
    grid.id = `agrid-${qi}`;

    q.answers.forEach((a, ai) => {
      const row = document.createElement('div');
      row.className = 'answer-row';

      const num = document.createElement('div');
      num.style.cssText = 'min-width:22px;font-family:"Anton",sans-serif;color:var(--gold);font-size:1.1rem';
      num.textContent = ai + 1;

      const textIn = document.createElement('input');
      textIn.className = 'answer-text';
      textIn.type = 'text';
      textIn.placeholder = 'Answer…';
      textIn.value = a.text;
      textIn.addEventListener('input', () => { questions[qi].answers[ai].text = textIn.value; });

      const ptsIn = document.createElement('input');
      ptsIn.className = 'answer-points';
      ptsIn.type = 'text';
      ptsIn.inputMode = 'numeric';
      ptsIn.pattern = '[0-9]*';
      ptsIn.placeholder = 'Points';
      ptsIn.value = a.pts || '';
      ptsIn.addEventListener('input', () => {
        ptsIn.value = ptsIn.value.replace(/[^0-9]/g, '');
        questions[qi].answers[ai].pts = parseInt(ptsIn.value) || 0;
      });

      row.appendChild(num);
      row.appendChild(textIn);
      row.appendChild(ptsIn);
      grid.appendChild(row);
    });
    item.appendChild(grid);

    // Add / Remove answer buttons
    const btnRow = document.createElement('div');
    btnRow.className = 'mt8 row';

    const addAnsBtn = document.createElement('button');
    addAnsBtn.className = 'btn btn-outline btn-sm';
    addAnsBtn.textContent = '+ Answer';
    addAnsBtn.addEventListener('click', () => addAnswer(qi));
    btnRow.appendChild(addAnsBtn);

    if (q.answers.length > 2) {
      const remAnsBtn = document.createElement('button');
      remAnsBtn.className = 'btn btn-outline btn-sm';
      remAnsBtn.textContent = '− Last';
      remAnsBtn.addEventListener('click', () => removeAnswer(qi));
      btnRow.appendChild(remAnsBtn);
    }
    item.appendChild(btnRow);
    list.appendChild(item);
  });

  document.getElementById('qaCount').textContent =
    questions.length + ' question' + (questions.length !== 1 ? 's' : '');
}

function addAnswer(qi) {
  if (questions[qi].answers.length >= 8) { showToast('Max 8 answers per question'); return; }
  // Capture current values before re-render
  captureInputValues();
  questions[qi].answers.push({text:'', pts:0});
  renderQAList();
  // Focus the new answer text field
  setTimeout(() => {
    const grid = document.getElementById(`agrid-${qi}`);
    if (grid) {
      const rows = grid.querySelectorAll('.answer-row');
      const last = rows[rows.length - 1];
      if (last) last.querySelector('.answer-text').focus();
    }
  }, 50);
}

function removeAnswer(qi) {
  if (questions[qi].answers.length <= 2) { showToast('Need at least 2 answers'); return; }
  captureInputValues();
  questions[qi].answers.pop();
  renderQAList();
}

// Sync all live input values into the questions array without re-rendering
function captureInputValues() {
  document.querySelectorAll('.qa-item').forEach((item, qi) => {
    const qInput = item.querySelector('.qa-question-input');
    if (qInput && questions[qi]) questions[qi].q = qInput.value;
    item.querySelectorAll('.answer-row').forEach((row, ai) => {
      if (!questions[qi] || !questions[qi].answers[ai]) return;
      const txt = row.querySelector('.answer-text');
      const pts = row.querySelector('.answer-points');
      if (txt) questions[qi].answers[ai].text = txt.value;
      if (pts) questions[qi].answers[ai].pts  = parseInt(pts.value) || 0;
    });
  });
}

// ═══════════════════════════════════════════════
//  START GAME
// ═══════════════════════════════════════════════
function startGame() {
  captureInputValues();
  // Validate
  const validQs = questions.filter(q=>q.q.trim() && q.answers.some(a=>a.text.trim() && a.pts>0));
  if (validQs.length === 0) { showToast('Add at least one question with answers!'); return; }
  if (teams.every(t=>!t.name.trim())) { showToast('Name your teams!'); return; }

  questions = validQs.map(q=>({...q, answers: q.answers.filter(a=>a.text.trim()&&a.pts>0)}));
  teams.forEach((t,i)=>{ t.score=0; t.color=TEAM_COLORS[i%TEAM_COLORS.length]; });
  currentQ=0; currentTeam=0;
  showScreen('gameScreen');
  loadQuestion();
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function loadQuestion() {
  strikes=0; roundPot=0; revealedAnswers=new Set();
  updateStrikes();
  updatePot();

  const q = questions[currentQ];
  document.getElementById('boardQuestion').textContent = q.q;
  document.getElementById('roundInfo').textContent = `Question ${currentQ+1} of ${questions.length}`;

  renderBoard();
  renderScores();
  updateTurnBanner();
  document.getElementById('guessInput').value='';
  document.getElementById('guessInput').focus();
}

function renderBoard() {
  const board = document.getElementById('answersBoard');
  board.innerHTML='';
  const q = questions[currentQ];
  q.answers.forEach((a,i)=>{
    const tile = document.createElement('div');
    tile.className='answer-tile'+(revealedAnswers.has(i)?' revealed':'');
    tile.id=`tile-${i}`;
    tile.onclick=()=>revealTile(i);
    const revealed = revealedAnswers.has(i);
    tile.innerHTML=`
      <div class="tile-num ${revealed?'shown':''}">${i+1}</div>
      <div class="tile-text ${revealed?'':'tile-hidden'}">${revealed?a.text:'▮▮▮▮▮▮'}</div>
      ${revealed?`<div class="tile-pts">${a.pts}</div>`:''}
    `;
    board.appendChild(tile);
  });
}

function revealTile(i) {
  if (revealedAnswers.has(i)) return;
  const q = questions[currentQ];
  revealedAnswers.add(i);
  roundPot += q.answers[i].pts;
  updatePot();
  renderBoard();
  flash('✓ '+q.answers[i].pts+' pts', 'correct');
}

function submitGuess() {
  const input = document.getElementById('guessInput');
  const guess = input.value.trim().toLowerCase();
  if (!guess) return;
  input.value='';

  const q = questions[currentQ];
  const match = q.answers.findIndex((a,i)=>
    !revealedAnswers.has(i) && a.text.toLowerCase().includes(guess)
  );

  if (match !== -1) {
    revealTile(match);
    // auto-check if all revealed
    if (revealedAnswers.size === q.answers.length) {
      setTimeout(()=>awardRound(), 600);
    }
  } else {
    flash('✗ WRONG', 'wrong');
    addStrike();
  }
  input.focus();
}

function addStrike() {
  if (strikes >= 3) return;
  strikes++;
  updateStrikes();
  if (strikes >= 3) {
    setTimeout(()=>{
      nextTeamTurn();
    }, 800);
  }
}

function updateStrikes() {
  for(let i=1;i<=3;i++) {
    const el = document.getElementById(`s${i}`);
    el.classList.toggle('active', i<=strikes);
  }
}

function updatePot() {
  document.getElementById('potDisplay').textContent = roundPot;
}

function updateTurnBanner() {
  const t = teams[currentTeam];
  document.getElementById('turnBanner').textContent = `${t.name}'s Turn`;
}

function renderScores() {
  const bar = document.getElementById('scoresBar');
  bar.innerHTML = '';
  teams.forEach((t,i)=>{
    const chip = document.createElement('div');
    chip.className='score-chip'+(i===currentTeam?' active-team':'');
    chip.style.borderColor=t.color; chip.style.color=t.color;
    chip.textContent=`${t.name}: ${t.score}`;
    bar.appendChild(chip);
  });
}

function nextTeamTurn() {
  // if all answers revealed, award before switching
  const q = questions[currentQ];
  if (revealedAnswers.size === q.answers.length) { awardRound(); return; }

  strikes=0; updateStrikes();
  currentTeam = (currentTeam+1) % teams.length;
  updateTurnBanner();
  renderScores();
  document.getElementById('guessInput').focus();
}

function awardRound() {
  if (roundPot > 0) {
    teams[currentTeam].score += roundPot;
    showToast(`${teams[currentTeam].name} wins ${roundPot} points!`);
    renderScores();
  }
}

function revealAll() {
  const q = questions[currentQ];
  q.answers.forEach((_,i)=>{ if(!revealedAnswers.has(i)) revealedAnswers.add(i); roundPot+=q.answers[i].pts; });
  roundPot = q.answers.reduce((s,a)=>s+a.pts,0);
  updatePot();
  renderBoard();
}

function nextQuestion() {
  awardRound();
  currentQ++;
  if (currentQ >= questions.length) {
    showWinner();
    return;
  }
  currentTeam = (currentTeam+1) % teams.length;
  loadQuestion();
}

// ═══════════════════════════════════════════════
//  WINNER
// ═══════════════════════════════════════════════
function showWinner() {
  const sorted = [...teams].sort((a,b)=>b.score-a.score);
  const winner = sorted[0];

  document.getElementById('winnerName').textContent = winner.name;
  const fs = document.getElementById('finalScores');
  fs.innerHTML = sorted.map((t,i)=>`
    <div class="final-score-row" style="border-left:4px solid ${t.color}">
      <span>${i===0?'🏆 ':''} ${t.name}</span>
      <span style="color:var(--gold)">${t.score} pts</span>
    </div>`).join('');

  showScreen('winnerScreen');
}

function playAgain() {
  teams.forEach(t=>t.score=0);
  currentQ=0; currentTeam=0;
  showScreen('gameScreen');
  loadQuestion();
}

function backToSetup() {
  showScreen('setupScreen');
  renderQAList();
  renderTeams();
}

function endGame() {
  if (confirm('End the game and go back to setup?')) {
    showScreen('setupScreen');
    renderQAList();
    renderTeams();
  }
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function flash(msg, type) {
  const overlay = document.getElementById('flashOverlay');
  const content = document.getElementById('flashContent');
  overlay.className = 'flash-overlay';
  content.className = `flash-content flash-${type}`;
  content.textContent = msg;
  // Trigger reflow
  void overlay.offsetWidth;
  overlay.classList.add('show');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
